name: Deploy Cloud dashboard

on:
  push:
    branches: [main]
    paths:
      - "cloud/web/**"
      - ".github/workflows/deploy-cloud-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloud/web/package-lock.json
      - uses: actions/configure-pages@v6
      - name: Verify public Cloud configuration
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ vars.BOUNDARYCI_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.BOUNDARYCI_SUPABASE_PUBLISHABLE_KEY }}
          VITE_BOUNDARYCI_INGEST_URL: ${{ vars.BOUNDARYCI_INGEST_URL }}
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"
          test -n "$VITE_BOUNDARYCI_INGEST_URL"
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.BOUNDARYCI_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.BOUNDARYCI_SUPABASE_PUBLISHABLE_KEY }}
          VITE_BOUNDARYCI_INGEST_URL: ${{ vars.BOUNDARYCI_INGEST_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.BOUNDARYCI_TURNSTILE_SITE_KEY }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: cloud/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v5
