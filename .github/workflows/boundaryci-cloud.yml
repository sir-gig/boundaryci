name: BoundaryCI Cloud

on:
  pull_request:
    paths:
      - "cloud/supabase/**"
      - ".github/workflows/boundaryci-cloud.yml"
  push:
    branches: [main]
    paths:
      - "cloud/supabase/**"
      - ".github/workflows/boundaryci-cloud.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tenant-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: sir-gig/boundaryci@v0.2.0
        with:
          target: cloud/supabase
          profile: supabase
          fail-on: high
          upload: "true"
          cloud-url: https://banbckoxtzptmrtsctki.supabase.co/functions/v1/ingest-scan
          cloud-token: ${{ secrets.BOUNDARYCI_CLOUD_TOKEN }}
